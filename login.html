<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.box {
  background: #020617;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #1e293b;
  border: none;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
}

#error { color: red; }
</style>
</head>

<body>

<div class="box">
  <h2>Minewater Chat</h2>

  <form id="form">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Contraseña" required>
    <button>Entrar</button>
  </form>

  <p id="error"></p>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient('https://gkuuwuqwumoorqmqkuka.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdXV3dXF3dW1vb3JxbXFrdWthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjUwMDksImV4cCI6MjA5MDQ0MTAwOX0.ME8C09iSbowqcak2Bezbd4otWzTXyR3bV8kf4hfodUg')

// si ya está dentro
const { data: { user } } = await supabase.auth.getUser()
if (user) window.location.href = 'dashboard.html'

document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault()

  const email = document.getElementById('email').value
  const password = document.getElementById('password').value

  const { error } = await supabase.auth.signInWithPassword({ email, password })

  if (error) {
    document.getElementById('error').textContent = 'Error login'
    return
  }

  window.location.href = 'dashboard.html'
})
</script>

</body>
</html>
