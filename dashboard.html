<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Minewater Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111b21;
  color: white;
}

/* HEADER */
#header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  background: #202c33;
}

/* SEARCH */
#searchBar {
  padding: 10px;
  background: #111b21;
}

#searchBar input {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  background: #202c33;
  color: white;
}

/* CHAT LIST */
#conversations {
  overflow-y: auto;
  height: calc(100vh - 120px);
}

.chat-item {
  display: flex;
  align-items: center;
  padding: 12px;
  border-bottom: 1px solid #202c33;
  cursor: pointer;
}

.chat-item:hover {
  background: #202c33;
}

.avatar {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: #22c55e;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 10px;
  font-weight: bold;
}

.chat-info {
  flex: 1;
}

.chat-name {
  font-weight: bold;
}

.chat-last {
  font-size: 13px;
  opacity: 0.7;
}

.chat-time {
  font-size: 12px;
  opacity: 0.6;
}

/* FLOAT BUTTON */
#newChat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00a884;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  cursor: pointer;
}

/* CHAT VIEW */
#chatView {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0b141a;
  display: none;
  flex-direction: column;
}

#chatHeader {
  padding: 15px;
  background: #202c33;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  background: #202c33;
  padding: 8px;
  margin: 5px;
  border-radius: 8px;
  max-width: 70%;
}

.me {
  background: #005c4b;
  margin-left: auto;
}

/* INPUT */
#chatInput {
  display: flex;
  padding: 10px;
  background: #202c33;
}

#chatInput input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}
</style>
</head>

<body>

<div id="header">Minewater Chat</div>

<div id="searchBar">
  <input id="search" placeholder="Buscar...">
</div>

<div id="conversations"></div>

<div id="newChat">+</div>

<!-- CHAT -->
<div id="chatView">
  <div id="chatHeader">Chat</div>
  <div id="messages"></div>

  <div id="chatInput">
    <input id="messageInput" placeholder="Mensaje...">
    <button id="send">➤</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient('https://gkuuwuqwumoorqmqkuka.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdXV3dXF3dW1vb3JxbXFrdWthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjUwMDksImV4cCI6MjA5MDQ0MTAwOX0.ME8C09iSbowqcak2Bezbd4otWzTXyR3bV8kf4hfodUg')

const { data: { user } } = await supabase.auth.getUser()
if (!user) location.href = 'login.html'

let currentConversation = null

// 🧠 cargar lista tipo WhatsApp
async function loadChats() {
  const { data } = await supabase
    .from('participants')
    .select('conversation_id, conversations(name)')
    .eq('user_id', user.id)

  const container = document.getElementById('conversations')
  container.innerHTML = ''

  for (const c of data) {
    const { data: lastMsg } = await supabase
      .from('messages')
      .select('content, created_at')
      .eq('conversation_id', c.conversation_id)
      .order('created_at', { ascending: false })
      .limit(1)

    const div = document.createElement('div')
    div.className = 'chat-item'

    const name = c.conversations.name || 'Privado'
    const last = lastMsg?.[0]?.content || ''

    div.innerHTML = `
      <div class="avatar">${name[0]}</div>
      <div class="chat-info">
        <div class="chat-name">${name}</div>
        <div class="chat-last">${last}</div>
      </div>
      <div class="chat-time">•</div>
    `

    div.onclick = () => openChat(c.conversation_id, name)

    container.appendChild(div)
  }
}

// 📥 abrir chat
async function openChat(id, name) {
  currentConversation = id
  document.getElementById('chatView').style.display = 'flex'
  document.getElementById('chatHeader').textContent = name
  loadMessages()
}

// 📥 mensajes
async function loadMessages() {
  const { data } = await supabase
    .from('messages')
    .select('content, user_id')
    .eq('conversation_id', currentConversation)
    .order('created_at')

  const box = document.getElementById('messages')
  box.innerHTML = ''

  data.forEach(m => {
    const d = document.createElement('div')
    d.className = 'msg ' + (m.user_id === user.id ? 'me' : '')
    d.textContent = m.content
    box.appendChild(d)
  })
}

// 📤 enviar
send.onclick = async () => {
  await supabase.from('messages').insert({
    content: messageInput.value,
    user_id: user.id,
    conversation_id: currentConversation
  })

  messageInput.value = ''
  loadMessages()
  loadChats()
}

// 🔍 buscar usuarios
search.oninput = async () => {
  const { data } = await supabase
    .from('profiles')
    .select('id, name')
    .ilike('name', `%${search.value}%`)

  const container = document.getElementById('conversations')
  container.innerHTML = ''

  data.forEach(u => {
    const div = document.createElement('div')
    div.className = 'chat-item'
    div.innerHTML = `<div class="avatar">${u.name[0]}</div>${u.name}`
    div.onclick = () => createChat(u.id)
    container.appendChild(div)
  })
}

// ➕ nuevo chat
newChat.onclick = () => {
  search.focus()
}

// crear chat
async function createChat(otherId) {
  const { data: conv } = await supabase
    .from('conversations')
    .insert({})
    .select()
    .single()

  await supabase.from('participants').insert([
    { conversation_id: conv.id, user_id: user.id },
    { conversation_id: conv.id, user_id: otherId }
  ])

  loadChats()
}

await loadChats()
</script>

</body>
</html>
